<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Container Load Planner | LeadTime Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <!-- Global Header -->
    <header class="bg-white/80 border-b border-slate-200 sticky top-0 z-[3000] backdrop-blur-md">
        <div class="container mx-auto px-4 max-w-7xl flex justify-between items-center py-4">
            <div class="flex items-center gap-8">
                <a href="index.html" class="block">
                    <h1 class="logo-brand text-xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
                </a>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">Analyzer</a>
                    <a href="planner.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">3D Load Planner</a>
                    <a href="news.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">Logistics News</a>
                    <a href="about.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-7xl py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Controls -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Container Config
                    </h2>
                    
                    <div class="space-y-4 mb-8">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Container Type</label>
                            <select id="container-type" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <option value="20ft">20ft Standard (5.9m)</option>
                                <option value="40ft">40ft Standard (12.0m)</option>
                                <option value="40hc">40ft High Cube (12.0m, Extra H)</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">Cargo List</h3>
                        <button id="add-cargo-btn" class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full hover:bg-indigo-600 hover:text-white transition-all">+ Add Item</button>
                    </div>

                    <div id="cargo-items" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Cargo rows added by container3d.js -->
                    </div>

                    <button id="simulate-load-btn" class="w-full mt-8 bg-indigo-600 text-white font-black py-5 rounded-2xl hover:bg-indigo-700 transform active:scale-95 transition-all shadow-xl shadow-indigo-100 uppercase text-xs tracking-widest">
                        Run Load Simulation
                    </button>
                </div>

                <!-- HUD: Efficiency -->
                <div class="bg-indigo-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-4">Volume Utilization</p>
                        <div class="flex items-baseline gap-2 mb-2">
                            <span id="vol-util" class="text-5xl font-black">0%</span>
                            <span class="text-indigo-300 font-bold text-sm">Packed</span>
                        </div>
                        <div class="w-full bg-indigo-800 h-2 rounded-full overflow-hidden mb-6">
                            <div id="vol-bar" class="bg-indigo-400 h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-black text-indigo-300 uppercase">
                            <span>Packed Units</span>
                            <span id="packed-count">0/0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: 3D View -->
            <div class="lg:col-span-8">
                <div class="bg-white p-4 rounded-[3rem] shadow-2xl border border-slate-100 h-[700px] relative group">
                    <div id="canvas-container" class="w-full h-full rounded-[2.5rem] bg-slate-900 overflow-hidden relative">
                        <div id="canvas-placeholder" class="absolute inset-0 flex items-center justify-center flex-col text-slate-500">
                            <svg class="w-12 h-12 mb-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="1.5"/></svg>
                            <p class="text-xs font-bold uppercase tracking-widest">Initializing 3D Engine...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="container3d.js"></script>
</body>
</html>
