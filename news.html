<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Risk & News | LeadTime Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <main-header active="news"></main-header>

    <main class="container mx-auto px-4 max-w-7xl py-16">
        <div class="mb-16 text-center max-w-3xl mx-auto">
            <h2 class="text-5xl font-black text-slate-900 tracking-tighter mb-4 leading-none">Maritime <span class="text-indigo-600">Intelligence</span> Feed</h2>
            <p class="text-slate-500 font-medium text-lg mb-8">Authoritative analysis and real-time alerts from the frontlines of global trade and logistics infrastructure.</p>
            
            <div class="flex items-center justify-center gap-4">
                <div class="flex items-center gap-3 px-6 py-3 bg-white rounded-full border border-slate-200 shadow-sm">
                    <span id="live-indicator" class="w-2.5 h-2.5 bg-slate-300 rounded-full"></span>
                    <span id="live-status" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Real-time Stream: OFF</span>
                    <button id="live-toggle" class="ml-2 w-10 h-5 bg-slate-200 rounded-full relative transition-colors">
                        <span class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-all shadow-md" id="toggle-knob"></span>
                    </button>
                </div>
                <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-l border-slate-200 pl-4" id="last-sync-time">Sync Latency: --:--</div>
            </div>
        </div>

        <div id="category-filters" class="flex flex-wrap justify-center gap-3 mb-16">
            <button data-category="all" class="filter-btn px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest bg-indigo-600 text-white shadow-xl shadow-indigo-100 transition-all">Consolidated Stream</button>
            <button data-category="Liner News" class="filter-btn px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest bg-white text-slate-600 border border-slate-200 hover:border-indigo-200 transition-all">Liner Analysis</button>
            <button data-category="Port Status" class="filter-btn px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest bg-white text-slate-600 border border-slate-200 hover:border-indigo-200 transition-all">Infrastructure</button>
            <button data-category="Logistics Technology" class="filter-btn px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest bg-white text-slate-600 border border-slate-200 hover:border-indigo-200 transition-all">Tech & Data</button>
        </div>

        <div id="news-items" class="max-w-4xl mx-auto space-y-16">
            <!-- News items populated by JS -->
        </div>

        <!-- Newsletter CTA for UX Improvement -->
        <section class="mt-32 max-w-4xl mx-auto">
            <div class="expert-card bg-slate-900 p-12 text-white border-none relative overflow-hidden">
                <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                    <div class="text-center md:text-left">
                        <h3 class="text-2xl font-black tracking-tighter mb-2">Subscribe to Global Intelligence</h3>
                        <p class="text-slate-400 text-sm font-medium">Get high-impact supply chain insights delivered weekly.</p>
                    </div>
                    <form class="flex gap-2 w-full md:w-auto">
                        <input type="email" placeholder="professional@email.com" class="newsletter-input px-6 py-3 rounded-xl text-sm font-bold flex-1 md:w-64">
                        <button class="bg-indigo-600 text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-700 transition-all">Subscribe</button>
                    </form>
                </div>
                <!-- Abstract background shapes -->
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl"></div>
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-indigo-900/50 rounded-full blur-3xl"></div>
            </div>
        </section>
    </main>

    <main-footer></main-footer>
    <cookie-banner></cookie-banner>

    <script src="components.js?v=1.2"></script>
    <script src="news.js?v=1.2"></script>
</body>
</html>
