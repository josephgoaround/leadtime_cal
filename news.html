<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics News Feed | LeadTime Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .timeline-line { position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; z-index: 0; }
        @media (min-width: 768px) { .timeline-line { left: 50%; transform: translateX(-50%); } }
        .news-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .news-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .category-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 9999px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-[3000] shadow-sm">
        <div class="container mx-auto px-4 max-w-6xl flex justify-between items-center py-4">
            <div class="flex items-center gap-8">
                <a href="index.html" class="block">
                    <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
                </a>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1">Analyzer</a>
                    <a href="planner.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1">3D Load Planner</a>
                    <a href="news.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">Logistics News</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex bg-slate-100 p-1 rounded-lg mr-2">
                    <button class="px-2 py-1 rounded text-[10px] font-bold transition-all bg-white shadow-sm text-indigo-600">USD</button>
                    <button class="px-2 py-1 rounded text-[10px] font-bold transition-all text-gray-500 hover:text-gray-700">KRW</button>
                </div>
                <div class="flex items-center gap-1 border-l pl-3 border-slate-200">
                    <button class="px-3 py-1.5 rounded-md text-xs font-bold bg-white border border-slate-200 text-slate-600">KO</button>
                    <button class="px-3 py-1.5 rounded-md text-xs font-bold bg-indigo-600 text-white shadow-sm">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 py-12 px-4">
        <div class="container mx-auto max-w-4xl">
            <!-- Hero Section -->
            <div class="text-center mb-16">
                <h2 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-4">Logistics <span class="text-indigo-600">Daily Feed</span></h2>
                <p class="text-slate-500 font-medium max-w-xl mx-auto">전 세계 물류 항로, 선사 동향, 항만 상태 및 물류 기술에 대한 최신 뉴스를 매일 실시간으로 업데이트합니다.</p>
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap justify-center gap-2 mb-12">
                <button class="filter-btn active px-4 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white" data-category="all">ALL</button>
                <button class="filter-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-white text-slate-600 hover:bg-slate-100" data-category="Liner News">LINER</button>
                <button class="filter-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-white text-slate-600 hover:bg-slate-100" data-category="Port Status">PORT</button>
                <button class="filter-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-white text-slate-600 hover:bg-slate-100" data-category="Logistics Technology">TECH</button>
            </div>

            <!-- News Feed Timeline -->
            <div class="relative" id="news-feed-container">
                <!-- Timeline Line -->
                <div class="timeline-line hidden md:block"></div>
                
                <!-- News items injected here -->
                <div id="news-items" class="space-y-12 relative z-10">
                    <!-- Loading State -->
                    <div class="flex flex-col items-center justify-center py-20 animate-pulse">
                        <div class="w-12 h-12 bg-indigo-200 rounded-full mb-4"></div>
                        <div class="h-4 w-48 bg-slate-200 rounded-full mb-2"></div>
                        <div class="h-3 w-32 bg-slate-100 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (Matching style) -->
    <footer class="bg-slate-900 text-white py-12">
        <div class="container mx-auto px-4 max-w-6xl text-center">
            <h1 class="text-2xl font-black mb-6">LeadTime<span class="text-indigo-400">Intelligence</span></h1>
            <p class="text-slate-400 text-sm max-w-lg mx-auto mb-8">Data-driven maritime logistics insight platform for global trade optimization.</p>
            <div class="flex justify-center gap-6 text-slate-400 text-xs font-bold tracking-widest uppercase">
                <a href="#" class="hover:text-white">API Docs</a>
                <a href="#" class="hover:text-white">Terms</a>
                <a href="#" class="hover:text-white">Support</a>
            </div>
        </div>
    </footer>

    <script src="news.js"></script>
</body>
</html>
