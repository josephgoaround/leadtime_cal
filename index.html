<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadTime Intelligence | Global Logistics Pathfinder</title>
    <meta name="description" content="Advanced global logistics lead time simulator and route visualization platform. Analyze sea and air transit times with precision Dijkstra routing.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900 leading-normal">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-[2000] shadow-sm">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center max-w-[1800px]">
            <a href="index.html" class="block">
                <h1 class="text-xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
            </a>
            
            <nav class="flex items-center gap-8">
                <a href="index.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">🌍 Route Analyzer</a>
                <a href="planner.html" class="text-sm font-bold text-slate-500 hover:text-indigo-600 transition-colors">📦 3D Load Planner</a>
            </nav>

            <div class="flex items-center gap-3">
                <div class="hidden sm:flex bg-slate-100 p-1 rounded-lg">
                    <button id="curr-usd" class="px-2 py-1 rounded text-[10px] font-bold transition-all bg-white shadow-sm text-indigo-600">USD</button>
                    <button id="curr-krw" class="px-2 py-1 rounded text-[10px] font-bold transition-all text-slate-500">KRW</button>
                </div>
                <div class="flex items-center gap-1 border-l pl-3 border-slate-200">
                    <button id="lang-ko" class="px-3 py-1.5 rounded-md text-xs font-bold bg-white border border-slate-200">KO</button>
                    <button id="lang-en" class="px-3 py-1.5 rounded-md text-xs font-bold bg-indigo-600 text-white shadow-sm">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main id="analyzer" class="container mx-auto p-6 max-w-6xl mt-8 animate-fade-in">
        <div class="mb-8">
            <p class="text-gray-500 text-sm font-medium" data-i18n="subtitle">Global Logistics & Customs AI Pathfinder</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
                    <h2 class="text-lg font-bold mb-6 flex items-center text-slate-800">⚙️ <span data-i18n="formTitle" class="ml-2">Shipment Config</span></h2>
                    <form id="shipping-form" class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Mode</label><select id="transport-mode" class="w-full py-2.5 px-3 border-slate-100 bg-slate-50 rounded-xl text-sm font-semibold"></select></div>
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Date</label><input type="date" id="departure-date" class="w-full py-2.5 px-3 border-slate-100 bg-slate-50 rounded-xl text-sm font-semibold"></div>
                        </div>
                        <div class="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 flex flex-col gap-3">
                            <div class="flex items-center gap-3"><div class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></div><p class="text-[10px] font-bold text-indigo-900 uppercase">Risk Intelligence Active</p></div>
                            <ul id="risk-summary-list" class="text-[9px] font-medium text-indigo-700 space-y-1 list-disc list-inside border-t border-indigo-100 pt-2 hidden"></ul>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Origin</label><select id="origin" class="w-full py-2.5 px-3 border-slate-100 bg-slate-50 rounded-xl text-sm font-semibold"></select></div>
                            <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Arrival</label><select id="destination" class="w-full py-2.5 px-3 border-gray-200 bg-gray-50 rounded-xl focus:ring-2 focus:ring-indigo-500 text-sm font-semibold"></select></div>
                            <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-wider">Commodity</label><select id="hscode" class="w-full py-2.5 px-3 border-gray-200 bg-gray-50 rounded-xl focus:ring-2 focus:ring-indigo-500 text-sm font-semibold"><option value="general">📦 General</option><option value="rf">❄️ Reefer</option><option value="dg">⚠️ Dangerous</option><option value="special">🏗️ Special</option></select></div>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg text-sm tracking-wide" data-i18n="btnAnalyze">RUN ANALYSIS</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-gray-900 text-white p-2.5 rounded-xl flex items-center gap-4 overflow-hidden shadow-lg border border-gray-800">
                    <div class="bg-red-600 text-[9px] font-black px-2 py-0.5 rounded uppercase shrink-0 animate-pulse">Live Alert</div>
                    <div id="news-ticker" class="text-[11px] font-bold whitespace-nowrap overflow-hidden flex-1 flex gap-12 animate-marquee"></div>
                </div>
                <div class="bg-white p-2 rounded-2xl shadow-2xl border border-gray-100 overflow-hidden relative"><div id="map" class="rounded-xl h-[600px] w-full"></div></div>
                <div id="dynamic-scm-feed" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 min-h-[200px]"><div id="feed-container"></div></div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-20 pt-16 pb-8">
        <div class="container mx-auto px-4 max-w-6xl text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">© 2026 LEADTIME INTELLIGENCE. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
