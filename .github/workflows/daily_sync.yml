name: Maritime News Sync Automation

on:
  schedule:
    # Runs every 2 hours for automated SCM updates
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run sync script
        run: python sync_data.py

      - name: Push Data to Separate Branch (No Main Clutter)
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # Create a temp directory to hold the data
          mkdir temp_data
          cp data/maritime_data.json temp_data/
          cp data/news.json temp_data/
          
          # Switch to an orphan branch for data
          git checkout --orphan news-data
          git rm -rf .
          
          # Move data back
          mkdir data
          cp temp_data/* data/
          
          git add data/
          git commit -m "chore: automated global SCM update $(date +'%Y-%m-%d %H:%M')"
          git push origin news-data --force
