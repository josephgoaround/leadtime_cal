<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Risk & News | LeadTime Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Global Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-[3000] shadow-sm">
        <div class="container mx-auto px-4 max-w-6xl flex justify-between items-center py-4">
            <div class="flex items-center gap-8">
                <a href="index.html" class="block">
                    <h1 class="logo-brand text-xl md:text-2xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
                </a>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1" data-i18n="navAnalyzer">Analyzer</a>
                    <a href="planner.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1" data-i18n="navPlanner">3D Load Planner</a>
                    <a href="news.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1" data-i18n="navNews">Logistics News</a>
                    <a href="about.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1" data-i18n="navAbout">About</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1 border-l pl-3 border-slate-200">
                    <button id="lang-ko" class="px-3 py-1.5 rounded-md text-xs font-bold bg-white border border-slate-200 text-slate-600">KO</button>
                    <button id="lang-en" class="px-3 py-1.5 rounded-md text-xs font-bold bg-indigo-600 text-white shadow-sm">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-6xl py-12">
        <div class="mb-12 text-center">
            <h2 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter mb-4" data-i18n="pageTitle">Logistics Risk & News</h2>
            <p class="text-slate-500 font-medium text-lg max-w-2xl mx-auto" data-i18n="pageDesc">Real-time updates on global maritime bottlenecks and SCM intelligence.</p>
        </div>

        <!-- Filters -->
        <div id="category-filters" class="flex flex-wrap justify-center gap-3 mb-12">
            <button data-category="all" class="px-6 py-2.5 rounded-full text-sm font-bold bg-indigo-600 text-white shadow-lg transition-all" data-i18n="allCategories">All Categories</button>
            <button data-category="maritime" class="px-6 py-2.5 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-100 hover:border-indigo-200 transition-all" data-i18n="maritime">Maritime</button>
            <button data-category="customs" class="px-6 py-2.5 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-100 hover:border-indigo-200 transition-all" data-i18n="customs">Customs</button>
            <button data-category="disruption" class="px-6 py-2.5 rounded-full text-sm font-bold bg-white text-slate-600 border border-slate-100 hover:border-indigo-200 transition-all" data-i18n="disruption">Disruption</button>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- News items injected by news.js -->
        </div>
    </main>

    <footer class="bg-white py-12 border-t border-slate-100 mt-20">
        <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row justify-between items-center gap-6">
            <h2 class="logo-brand text-xl font-black italic text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h2>
            <div class="flex gap-8 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <a href="about.html">About</a>
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <p>© 2026 LEADTIME INTELLIGENCE</p>
            </div>
        </div>
    </footer>

    <script src="news.js"></script>
</body>
</html>
