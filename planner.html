<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Container Load Planner | LeadTime Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <header class="bg-white/80 border-b border-slate-200 sticky top-0 z-[3000] backdrop-blur-md">
        <div class="container mx-auto px-4 max-w-7xl flex justify-between items-center py-4">
            <div class="flex items-center gap-8">
                <a href="index.html" class="block">
                    <h1 class="logo-brand text-xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
                </a>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">Analyzer</a>
                    <a href="planner.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">3D Load Planner</a>
                    <a href="news.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">Logistics News</a>
                    <a href="about.html" class="text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-7xl py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">Container Config</h2>
                    <select id="container-type" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold mb-6">
                        <option value="20ft">20ft Standard</option>
                        <option value="40ft">40ft Standard</option>
                        <option value="40hc">40ft High Cube</option>
                    </select>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-sm font-black text-slate-800 uppercase">Cargo List</h3>
                        <button id="add-cargo-btn" class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">+ Add Item</button>
                    </div>
                    <div id="cargo-items" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                    <button id="simulate-load-btn" class="w-full mt-8 bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-xs tracking-widest">Run Simulation</button>
                </div>
                <div class="bg-indigo-900 p-8 rounded-[2.5rem] text-white shadow-2xl">
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-4">Volume Utilization</p>
                    <div class="flex items-baseline gap-2 mb-2">
                        <span id="vol-util" class="text-5xl font-black">0%</span>
                    </div>
                    <div class="flex justify-between text-[10px] font-black text-indigo-300 uppercase">
                        <span>Packed Units</span>
                        <span id="packed-count">0/0</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-4 rounded-[3rem] shadow-2xl border border-slate-100 h-[700px] relative">
                    <div id="canvas-container" class="w-full h-full rounded-[2.5rem] bg-slate-900 overflow-hidden relative">
                        <div id="canvas-placeholder" class="absolute inset-0 flex items-center justify-center flex-col text-slate-500">
                            <p class="text-xs font-bold uppercase tracking-widest">Initializing 3D Engine...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="container3d.js?v=1.1"></script>
</body>
</html>
