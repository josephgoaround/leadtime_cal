<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadTime Intelligence | Global Logistics Pathfinder</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-[3000] shadow-sm">
        <div class="container mx-auto px-4 max-w-6xl flex justify-between items-center py-4">
            <div class="flex items-center gap-8">
                <a href="index.html" class="block">
                    <h1 class="logo-brand text-xl md:text-2xl font-extrabold tracking-tight text-slate-800">LeadTime<span class="text-indigo-600">Intelligence</span></h1>
                </a>
                <nav class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">Analyzer</a>
                    <a href="planner.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1">3D Load Planner</a>
                    <a href="news.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1">Logistics News</a>
                    <a href="about.html" class="text-sm font-bold text-gray-600 hover:text-indigo-600 transition-colors pb-1">About</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-6xl mt-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-100 border border-slate-100">
                    <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-2">Shipment Config</h3>
                    <form id="shipping-form" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Mode</label>
                                <select id="transport-mode" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold">
                                    <option value="sea">🚢 Sea</option>
                                    <option value="air">✈️ Air</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Departure Date</label>
                                <input type="date" id="departure-date" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="origin-search" placeholder="Search Origin..." class="w-full py-2 px-4 bg-slate-50 border border-slate-100 rounded-lg text-xs font-bold">
                            <select id="origin" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold"></select>
                            <input type="text" id="dest-search" placeholder="Search Destination..." class="w-full py-2 px-4 bg-slate-50 border border-slate-100 rounded-lg text-xs font-bold">
                            <select id="destination" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold"></select>
                            <select id="hscode" class="w-full py-3 px-4 bg-slate-50 border border-slate-100 rounded-xl text-sm font-bold">
                                <option value="general">📦 General</option>
                                <option value="rf">❄️ Reefer</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-xs tracking-widest">Run Analysis</button>
                    </form>
                </div>
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Active Risks</h4>
                    <ul id="risk-summary-list" class="text-[11px] font-bold text-red-600 space-y-2"></ul>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-3 rounded-[2.5rem] shadow-2xl border border-slate-100 h-[450px]">
                    <div id="map" class="w-full h-full rounded-[2rem]"></div>
                </div>
                <div id="summary-container" class="animate-fade-in min-h-[180px]">
                    <div class="text-center py-10 bg-white rounded-[2rem] border-2 border-dashed border-slate-100 text-slate-400 font-bold uppercase tracking-widest text-xs">Waiting for Analysis...</div>
                </div>
            </div>
        </div>
        <section id="feed-container" class="mb-20"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="main.js?v=1.1"></script>
</body>
</html>
